<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastros</title>
</head>

<body>
    <h1>Cadastro de usuario</h1>

    <form>
        <label for="titulo">digite seu nome:</label><br>
        <input type="text" id="titulo" name="titulo" placeholder="Digite o título do aviso"><br><br>

        <label for="titulo">digite seu email:</label><br>
        <input type="text" id="titulo" name="titulo" placeholder="Digite o título do aviso"><br><br>

        <label for="titulo">digite sua senha:</label><br>
        <input type="text" id="titulo" name="titulo" placeholder="Digite o título do aviso"><br><br>

        <button type="submit">enviar</button>

<h1>Cadastro de tarefa</h1>
 <label for="titulo">digite um titulo</label><br>
        <input type="text" id="titulo" name="titulo" placeholder="Digite o título do aviso"><br><br>

        <label for="descricao">Descreva sua tarefa</label><br>
        <textarea id="descricao" name="descricao" rows="5" placeholder="Digite o conteúdo do aviso"></textarea><br><br>

        <label for="categoria">prioridade</label><br>
        <select id="categoria" name="categoria">
            <option value="geral">alta</option>
            <option value="prova">media</option>
            <option value="evento">baixa</option>
        </select><br><br>

        <button type="submit">enviar tarefa</button>
        <h1>agendamento de horario</h1>
         <label for="titulo">digite seu nome:</label><br>
        <input type="text" id="titulo" name="titulo" placeholder="Digite o título do aviso"><br><br>

<label for="categoria">turma</label><br>
        <select id="categoria" name="categoria">
            <option value="geral">3T</option>
            <option value="prova">3M</option>
            <option value="evento">3Q</option>
        </select><br><br>
        <label for="categoria">HORARIOS DISPONIVEIS</label><br>
        <select id="categoria" name="categoria">
            <option value="geral">08:55</option>
            <option value="prova">10:05</option>
            <option value="evento">11:35</option>
            <option value="evento">07:15</option>
        </select><br><br>
        <button type="submit">agendar</button>
         <h1>LOGIN</h1>
          <label for="titulo">digite seu email:</label><br>
        <input type="text" id="titulo" name="titulo" placeholder="Digite o título do aviso"><br><br>
         <label for="titulo">digite sua senha:</label><br>
        <input type="text" id="titulo" name="titulo" placeholder="Digite o título do aviso"><br><br>
         <button type="submit">enviar</button>
          <h1>formulário de contato</h1>
           <label for="titulo">digite o assunto:</label><br>
        <input type="text" id="titulo" name="titulo" placeholder="Digite o título do aviso"><br><br>
 <label for="descricao">Descreva sua mensagem:</label><br>
        <textarea id="descricao" name="descricao" rows="5" placeholder="Digite o conteúdo do aviso"></textarea><br><br>
        <button type="submit">enviar formulario de contato</button>
    </form>
</body>

</html>
